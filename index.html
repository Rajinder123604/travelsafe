<!DOCTYPE html>
<html>
<head>
<title>Tourist Safety System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* TOP GOOGLE TRANSLATOR BAR */
#topBar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: white;
    padding: 8px;
    text-align: center;
    z-index: 9999;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* LOGIN */
#loginPage {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 60px;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 260px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

input {
    width: 90%;
    padding: 8px;
    margin: 8px;
}

button {
    padding: 8px 15px;
    margin: 5px;
    border: none;
    background: black;
    color: white;
    border-radius: 5px;
}

/* DASHBOARD */
#dashboard {
    display: none;
    padding: 20px;
    text-align: center;
    margin-top: 60px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    max-width: 420px;
    margin: 20px auto;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
    transition: 0.3s;
    font-size: 16px;
}

.card:hover {
    background: #e2e8f0;
    transform: scale(1.05);
}

/* MAP */
#map {
    display: block;
    margin: 20px auto;
}
</style>

</head>

<body>

<!-- TOP TRANSLATOR -->
<div id="topBar">
    <div id="google_translate_element"></div>
</div>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <h2>🔒 Secure Travel</h2>
        <p style="font-size:12px;color:gray;">
        Travel smart, stay safe — your safety is our priority
        </p>

        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>

        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Tourist Safety Dashboard</h2>

<div class="grid">

<div class="card" onclick="getLocation()">📍 Location</div>
<div class="card" onclick="sendSOS()">🚨 SOS</div>

<div class="card" onclick="findPolice()">🚓 Police</div>
<div class="card" onclick="showHotels()">🏨 Hotels</div>

<div class="card" onclick="checkOnline()">🌐 Online</div>
<div class="card" onclick="showID()">🆔 Digital ID</div>

<div class="card" onclick="chatbot()">🤖 Chatbot</div>
<div class="card" onclick="alertUser()">🔔 Alerts</div>

</div>

<p id="location"></p>
<iframe id="map" width="350" height="220"></iframe>

<div id="idBox" style="display:none;">
<h3>Digital ID</h3>
<p>Name: Rajinder</p>
<p>Status: Blockchain Verified ✅</p>
</div>

</div>

<script>

// LOGIN
async function login() {

alert("Login clicked");

let res = await fetch("https://touristbackend-1-pa9u.onrender.com/login", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
username: document.getElementById("username").value,
password: document.getElementById("password").value
})
});

let data = await res.json();

alert(data.message);

if (data.success) {
document.getElementById("loginPage").style.display = "none";
document.getElementById("dashboard").style.display = "block";
}

}

// REGISTER
async function register(){

let u = username.value;
let p = password.value;

let res = await fetch("https://touristbackend-1-pa9u.onrender.com/register", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({username: u, password: p})
});

let data = await res.json();
alert(data.message);

}

// LOCATION
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

location.innerHTML="Lat:"+lat+" | Lon:"+lon;
map.src=`https://maps.google.com/maps?q=${lat},${lon}&output=embed`;
});
}

// SOS
function sendSOS(){
alert("🚨 Emergency Alert Sent!");
}

// POLICE
function findPolice(){
navigator.geolocation.getCurrentPosition(pos=>{
let url=`https://www.google.com/maps/search/police+near+${pos.coords.latitude},${pos.coords.longitude}`;
window.location.href=url;
});
}

// HOTELS
function showHotels(){
navigator.geolocation.getCurrentPosition(pos=>{
let url=`https://www.google.com/maps/search/hotels+near+${pos.coords.latitude},${pos.coords.longitude}`;
window.location.href=url;
});
}

// ONLINE
function checkOnline(){
alert(navigator.onLine ? "Online ✅" : "Offline ❌");
}

// DIGITAL ID
function showID(){
idBox.style.display="block";
}

// CHATBOT
function chatbot(){
let msg = prompt("Ask something:");
if(!msg) return;

msg = msg.toLowerCase();

if(msg.includes("police")) alert("Use Police feature 🚓");
else if(msg.includes("hotel")) alert("Use Hotels feature 🏨");
else if(msg.includes("safe")) alert("Stay in safe public areas!");
else alert("I help you 😊");
}

// ALERT
function alertUser(){
alert("⚠️ Real-time alert: Stay safe!");
}

</script>

<!-- GOOGLE TRANSLATOR SCRIPT (FIXED) -->
<script>
    function googleTranslateElementInit() {
      setTimeout(() => {
        new google.translate.TranslateElement(
          { pageLanguage: 'en' },
          'google_translate_element'
        );
      }, 500);
    }
    </script>
    
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async>

</script>
