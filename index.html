<!DOCTYPE html>
<html>
<head>
<title>Tourist Safety System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* TOP BAR */
#topBar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: white;
    padding: 8px;
    text-align: center;
    z-index: 9999;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* DASHBOARD */
#dashboard {
    padding: 20px;
    text-align: center;
    margin-top: 60px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    max-width: 420px;
    margin: 20px auto;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* MAP */
#map {
    display: block;
    margin: 20px auto;
}
</style>
</head>

<body>

<!-- TRANSLATOR -->
<div id="topBar">
    <div id="google_translate_element"></div>
</div>

<!-- DASHBOARD (DIRECT OPEN) -->
<div id="dashboard">

<h2>Tourist Safety Dashboard</h2>

<div class="grid">

<div class="card" onclick="getLocation()">📍 Location</div>
<div class="card" onclick="sendSOS()">🚨 SOS</div>

<div class="card" onclick="findPolice()">🚓 Police</div>
<div class="card" onclick="showHotels()">🏨 Hotels</div>

<div class="card" onclick="checkOnline()">🌐 Online</div>
<div class="card" onclick="showID()">🆔 Digital ID</div>

<div class="card" onclick="chatbot()">🤖 Chatbot</div>
<div class="card" onclick="alertUser()">🔔 Alerts</div>

</div>

<p id="location"></p>
<iframe id="map" width="350" height="220"></iframe>

<div id="idBox" style="display:none;">
<h3>Digital ID</h3>
<p>Name: Rajinder</p>
<p>Status: Verified ✅</p>
</div>

</div>

<script>

// LOCATION
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

location.innerHTML="Lat:"+lat+" | Lon:"+lon;
map.src=`https://maps.google.com/maps?q=${lat},${lon}&output=embed`;
});
}

// SOS
function sendSOS(){
alert("🚨 Emergency Alert Sent!");
}

// POLICE
function findPolice(){
navigator.geolocation.getCurrentPosition(pos=>{
let url=`https://www.google.com/maps/search/police+near+${pos.coords.latitude},${pos.coords.longitude}`;
window.location.href=url;
});
}

// HOTELS
function showHotels(){
navigator.geolocation.getCurrentPosition(pos=>{
let url=`https://www.google.com/maps/search/hotels+near+${pos.coords.latitude},${pos.coords.longitude}`;
window.location.href=url;
});
}

// ONLINE
function checkOnline(){
alert(navigator.onLine ? "Online ✅" : "Offline ❌");
}

// ID
function showID(){
document.getElementById("idBox").style.display="block";
}

// CHATBOT
function chatbot(){
let msg = prompt("Ask something:");
if(!msg) return;

msg = msg.toLowerCase();

if(msg.includes("police")) alert("Use Police feature 🚓");
else if(msg.includes("hotel")) alert("Use Hotels feature 🏨");
else alert("I help you 😊");
}

// ALERT
function alertUser(){
alert("⚠️ Stay safe!");
}

</script>

<!-- GOOGLE TRANSLATE -->
<script>
function googleTranslateElementInit() {
    new google.translate.TranslateElement(
        { pageLanguage: 'en' },
        'google_translate_element'
    );
}
</script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
